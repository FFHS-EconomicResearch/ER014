### Die zentrale Frage

&gt; "Wenn ich 100 zufällige Variablen auf Zusammenhang mit dem Marktwert teste — wie viele sind bei α = 0.05 signifikant?"

&lt;br&gt;

**Erwartete Antwort:** `\(100 \times 0.05 = 5\)` falsche Treffer

**Das ist kein Fehler — das ist Mathematik.**

&lt;br&gt;

## Teil 1: p-Hacking simulieren


``` r
set.seed(42)
n_tests &lt;- 100
n_obs   &lt;- nrow(tbl_buli)

# 100 zufällige (bedeutungslose) Variablen testen
p_values_random &lt;- map_dbl(1:n_tests, function(i) {
  # Zufällige Variable ohne echten Zusammenhang
  tbl_sim &lt;- tbl_buli %&gt;%
               mutate(rand_var = rnorm(n_obs))
  # Regression und p-Wert extrahieren
  lm(log_value ~ rand_var, data = tbl_sim) %&gt;%
    get_regression_table() %&gt;%
    filter(term == "rand_var") %&gt;%
    pull(p_value)
})

# Wie viele sind signifikant?
sum(p_values_random &lt; 0.05)
```

* Die genaue Zahl variiert je nach seed — wichtig ist die Größenordnung ~5
* Pointe: diese Treffer sind REIN zufällig — es gibt keinen echten Zusammenhang

## Teil 1: Visualisierung der p-Wert-Verteilung


``` r
tibble(test_nr = 1:n_tests,
       p_value = p_values_random,
       signifikant = p_values_random &lt; 0.05) %&gt;%
  ggplot(aes(x = p_value, fill = signifikant)) +
  geom_histogram(bins = 20, color = "white", boundary = 0) +
  geom_vline(xintercept = 0.05, color = "#D50006",
             linetype = "dashed", linewidth = 1.2) +
  scale_fill_manual(
    values = c("TRUE" = "#D50006", "FALSE" = "#b3b2b2"),
    labels = c("TRUE" = "p &lt; 0.05 (zufällig signifikant!)",
               "FALSE" = "p ≥ 0.05 (korrekt nicht signifikant)")
  ) +
  labs(x = "p-Wert", y = "Anzahl Tests", fill = NULL,
       title = "100 Tests mit zufälligen Variablen",
       subtitle = glue::glue("{sum(p_values_random &lt; 0.05)} von {n_tests} Tests sind p &lt; 0.05")) +
  theme_minimal(base_size = 12) +
  theme(legend.position = "bottom")
```

## Teil 2: Das reale Problem — viele Variablen im Datensatz


``` r
# Welche numerischen Variablen hat der Bundesliga-Datensatz?
tbl_buli_raw %&gt;%
  select(where(is.numeric)) %&gt;%
  names()
```

```
## [1] "season_start_year"        "player_age"              
## [3] "player_market_value_euro"
```


``` r
# Alle numerischen Variablen gegen log_value testen
tbl_test &lt;- tbl_buli_raw %&gt;%
              mutate(
                log_value = log(player_market_value_euro),
                age = lubridate::year(Sys.Date()) -
                      lubridate::year(player_dob)
              ) %&gt;%
              select(log_value, where(is.numeric),
                     -player_market_value_euro) %&gt;%
              select(log_value, everything())

p_values_real &lt;- tbl_test %&gt;%
  select(-log_value) %&gt;%
  names() %&gt;%
  map_dfr(function(var) {
    tryCatch({
      p &lt;- lm(as.formula(glue::glue("log_value ~ `{var}`")),
              data = tbl_test) %&gt;%
            broom::tidy() %&gt;%
            filter(term != "(Intercept)") %&gt;%
            pull(p.value)
      tibble(variable = var, p_value = p[1])
    }, error = function(e) tibble(variable = var, p_value = NA_real_))
  }) %&gt;%
  filter(!is.na(p_value)) %&gt;%
  arrange(p_value)

p_values_real %&gt;% head(10) %&gt;% gt() %&gt;%
  fmt_number(columns = p_value, decimals = 4) %&gt;%
  tab_options(table.font.size = "13px")
```

## Teil 3: Benjamini-Hochberg — FDR kontrollieren


``` r
# FDR-Korrektur mit Benjamini-Hochberg
p_values_adjusted &lt;- p_values_real %&gt;%
  mutate(
    p_adjusted_BH = p.adjust(p_value, method = "BH"),
    signifikant_roh     = p_value      &lt; 0.05,
    signifikant_adjusted = p_adjusted_BH &lt; 0.05
  )

# Vergleich: wie viele bleiben signifikant?
p_values_adjusted %&gt;%
  summarise(
    `Signifikant (roh, α=0.05)`    = sum(signifikant_roh,      na.rm = TRUE),
    `Signifikant (BH-korrigiert)`   = sum(signifikant_adjusted, na.rm = TRUE),
    `Reduktion`                     = sum(signifikant_roh, na.rm=TRUE) -
                                      sum(signifikant_adjusted, na.rm=TRUE)
  ) %&gt;%
  gt() %&gt;% tab_options(table.font.size = "14px")
```

  d.querySelectorAll('.remark-help-content table tr').forEach(tr => {
    const t = tr.querySelector('td:nth-child(2)').innerText;
    tr.querySelectorAll('td:first-child .key').forEach(key => {
      const k = key.innerText;
      if (/^[a-z]$/.test(k)) res[k] = t;  // must be a single letter (key)
    });
  });
  d.body.setAttribute('data-at-shortcutkeys', JSON.stringify(res));
})(document);
(function() {
  "use strict"
  // Replace <script> tags in slides area to make them executable
  var scripts = document.querySelectorAll(
    '.remark-slides-area .remark-slide-container script'
  );
  if (!scripts.length) return;
  for (var i = 0; i < scripts.length; i++) {
    var s = document.createElement('script');
    var code = document.createTextNode(scripts[i].textContent);
    s.appendChild(code);
    var scriptAttrs = scripts[i].attributes;
    for (var j = 0; j < scriptAttrs.length; j++) {
      s.setAttribute(scriptAttrs[j].name, scriptAttrs[j].value);
    }
    scripts[i].parentElement.replaceChild(s, scripts[i]);
  }
})();
(function() {
  var links = document.getElementsByTagName('a');
  for (var i = 0; i < links.length; i++) {
    if (/^(https?:)?\/\//.test(links[i].getAttribute('href'))) {
      links[i].target = '_blank';
    }
  }
})();</script>

<script>
slideshow._releaseMath = function(el) {
  var i, text, code, codes = el.getElementsByTagName('code');
  for (i = 0; i < codes.length;) {
    code = codes[i];
    if (code.parentNode.tagName !== 'PRE' && code.childElementCount === 0) {
      text = code.textContent;
      if (/^\\\((.|\s)+\\\)$/.test(text) || /^\\\[(.|\s)+\\\]$/.test(text) ||
          /^\$\$(.|\s)+\$\$$/.test(text) ||
          /^\\begin\{([^}]+)\}(.|\s)+\\end\{[^}]+\}$/.test(text)) {
        code.outerHTML = code.innerHTML;  // remove <code></code>
        continue;
      }
    }
    i++;
  }
};
slideshow._releaseMath(document);
</script>
