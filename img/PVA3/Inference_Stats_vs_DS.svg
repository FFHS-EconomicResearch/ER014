<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="720" height="420" fill="#ffffff" />

  <!-- Title -->
  <text x="360" y="40" text-anchor="middle" font-family="sans-serif" font-size="20">
    Verwirrung: „Inference“ vs. „Prediction“
  </text>

  <!-- Axis labels -->
  <text x="40" y="220" text-anchor="middle" font-family="sans-serif" font-size="12" transform="rotate(-90 40 220)">
    epistemologische Bedeutung
  </text>
  <text x="360" y="400" text-anchor="middle" font-family="sans-serif" font-size="12">
    technische / Engineering-Bedeutung
  </text>

  <!-- Left column: Statistik -->
  <rect x="60" y="80" width="260" height="280" fill="#f5f5ff" stroke="#777" />
  <text x="190" y="100" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">
    Statistik / Wissenschaft
  </text>

  <!-- Statistik: Inference-Box -->
  <rect x="90" y="130" width="200" height="80" fill="#d0d8ff" stroke="#555" />
  <text x="190" y="155" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">
    Inference
  </text>
  <text x="190" y="175" text-anchor="middle" font-family="sans-serif" font-size="11">
    Schlussfolgern über Parameter,
  </text>
  <text x="190" y="190" text-anchor="middle" font-family="sans-serif" font-size="11">
    Hypothesentests, Kausalität
  </text>

  <!-- Statistik: Prediction-Box -->
  <rect x="90" y="240" width="200" height="80" fill="#ffe4cc" stroke="#555" />
  <text x="190" y="265" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">
    Prediction
  </text>
  <text x="190" y="285" text-anchor="middle" font-family="sans-serif" font-size="11">
    Vorhersage von Werten
  </text>

  <!-- Right column: ML / LLMs -->
  <rect x="400" y="80" width="260" height="280" fill="#f5fffa" stroke="#777" />
  <text x="530" y="100" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">
    ML / LLMs / Engineering
  </text>

  <!-- ML: Training-Box -->
  <rect x="430" y="130" width="200" height="70" fill="#e0ffe0" stroke="#555" />
  <text x="530" y="155" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">
    Training
  </text>
  <text x="530" y="175" text-anchor="middle" font-family="sans-serif" font-size="11">
    Modell lernen aus Daten
  </text>

  <!-- ML: Inference-Box -->
  <rect x="430" y="230" width="200" height="70" fill="#fff2cc" stroke="#555" />
  <text x="530" y="250" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">
    Inference
  </text>
  <text x="530" y="268" text-anchor="middle" font-family="sans-serif" font-size="11">
    Forward Pass: Modell anwenden
  </text>
  <text x="530" y="283" text-anchor="middle" font-family="sans-serif" font-size="11">
    (faktisch: Prediction)
  </text>

  <!-- Verbindungspfeile: Begriffskollision -->
  <!-- Pfeil von Statistik-Inference zu ML-Inference-Label „gleicher Begriff, andere Bedeutung“ -->
  <line x1="290" y1="170" x2="430" y2="245" stroke="#aa0000" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="360" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aa0000">
    gleicher Begriff „Inference“,
  </text>
  <text x="360" y="225" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aa0000">
    unterschiedliche Bedeutung
  </text>

  <!-- Pfeil von Statistik-Prediction zu ML-Inference „eigentlich Prediction“ -->
  <line x1="290" y1="280" x2="430" y2="265" stroke="#0066aa" stroke-width="1.5" marker-end="url(#arrowheadBlue)" />
  <text x="360" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0066aa">
    hier wird „Inference“ für das genutzt,
  </text>
  <text x="360" y="310" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0066aa">
    was statistisch „Prediction“ wäre
  </text>

  <!-- Arrowhead definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#aa0000" />
    </marker>
    <marker id="arrowheadBlue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#0066aa" />
    </marker>
  </defs>

  <!-- Legende -->
  <rect x="230" y="340" width="260" height="60" fill="#ffffff" stroke="#999" />
  <text x="360" y="355" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold">
    Legende
  </text>
  <text x="240" y="372" font-family="sans-serif" font-size="11">
    • Statistik: „Inference“ = Parameter-/Hypothesenschluss
  </text>
  <text x="240" y="387" font-family="sans-serif" font-size="11">
    • ML/LLMs: „Inference“ = Modell ausführen (Forward Pass, faktisch Prediction)
  </text>
</svg>
