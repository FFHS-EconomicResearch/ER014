<!-- Column headers -->
<text x="170" y="28" text-anchor="middle" fill="#502479" font-weight="500" font-size="13">Bias tief (valide)</text>
<text x="510" y="28" text-anchor="middle" fill="#D50006" font-weight="500" font-size="13">Bias hoch (nicht valide)</text>

<!-- Row headers -->
