<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" style="max-width:100%;height:auto;font-family:'Fira Sans','Helvetica Neue',Arial,sans-serif">
<style>
:root{--fr:#D50006;--fv:#502479;--fp:#7d0a52;--fg:#686868;--fgl:#b3b2b2;--ring1:#fce8e9;--ring2:#f5d0d1;--ring3:#e8a0a2;--bull:#D50006;--tx:#222;--ts:#686868}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
